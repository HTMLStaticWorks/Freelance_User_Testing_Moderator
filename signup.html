<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UserTestPro</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body
    class="font-inter bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased min-h-screen flex flex-col items-center justify-center py-12 relative overflow-x-hidden">

    <!-- Top Header Toggles -->
    <header class="fixed top-0 left-0 w-full p-4 sm:p-6 flex justify-end items-center z-50 pointer-events-none">
        <div class="flex items-center gap-3 sm:gap-4 pointer-events-auto">
            <button id="theme-toggle"
                class="p-2.5 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-xl border border-slate-200 dark:border-slate-700 transition-all hover:scale-110 active:scale-95"
                title="Toggle Theme">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button id="rtl-toggle"
                class="h-10 px-4 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-xl border border-slate-200 dark:border-slate-700 text-xs font-bold transition-all hover:scale-110 active:scale-95"
                title="Toggle RTL">
                RTL
            </button>
        </div>
    </header>

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-3xl animate-blob">
        </div>
        <div
            class="absolute top-0 right-0 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-3xl animate-blob animation-delay-2000">
        </div>
    </div>

    <div class="w-full max-w-lg px-4 relative z-10 reveal active">
        <div
            class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700 p-6 sm:p-10 rounded-3xl shadow-2xl">

            <div class="text-center mb-6">
                <a href="index.html" class="inline-flex items-center gap-2 mb-4">
                    <div
                        class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-sora font-bold text-lg">
                        UX</div>
                    <span class="font-sora font-bold text-xl text-slate-900 dark:text-white">UserTest<span
                            class="text-primary">Pro</span></span>
                </a>
                <h2 class="text-xl font-sora font-bold text-slate-900 dark:text-white">Create your account</h2>
                <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Join 5,000+ product managers building better UX.</p>
            </div>

            <!-- Social Signup Buttons -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <!-- Google -->
                <button
                    class="flex justify-center items-center gap-2 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 px-3 py-2.5 rounded-xl font-medium text-sm transition-all hover:-translate-y-0.5">
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Google
                </button>
                <!-- Apple -->
                <button
                    class="flex justify-center items-center gap-2 bg-black hover:bg-slate-900 dark:bg-white dark:hover:bg-slate-100 text-white dark:text-slate-900 px-3 py-2.5 rounded-xl font-medium text-sm transition-all hover:-translate-y-0.5">
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                    </svg>
                    Apple
                </button>
            </div>

            <div class="relative flex items-center justify-center mb-6">
                <div class="border-t border-slate-200 dark:border-slate-700 w-full absolute"></div>
                <span
                    class="bg-white dark:bg-slate-800 px-3 text-xs text-slate-400 relative z-10 uppercase font-medium tracking-wider">Or
                    continue with email</span>
            </div>

            <!-- Email Signup Form -->
            <form class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">First Name</label>
                        <input type="text" placeholder="Jane"
                            class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Last Name</label>
                        <input type="text" placeholder="Doe"
                            class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Work Email</label>
                    <input type="email" placeholder="jane@company.com"
                        class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="signup-pwd" placeholder="Min. 8 characters"
                            class="w-full px-4 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm pr-10">
                        <button type="button" onclick="togglePassword('signup-pwd', 'signup-pwd-icon')"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary">
                            <i data-lucide="eye" id="signup-pwd-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <!-- Password strength meter (Visual Only) -->
                    <div class="flex gap-1 mt-2">
                        <div class="h-1 flex-1 bg-green-500 rounded-full"></div>
                        <div class="h-1 flex-1 bg-green-500 rounded-full"></div>
                        <div class="h-1 flex-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                        <div class="h-1 flex-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">Strong password required</p>
                </div>

                <button type="button"
                    class="w-full bg-primary hover:bg-indigo-700 text-white font-medium py-3.5 rounded-xl transition-all duration-300 shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 mt-4">
                    Create Account
                </button>

                <p class="text-[11px] text-slate-400 dark:text-slate-500 text-center mt-4 leading-relaxed">
                    By creating an account, you agree to our
                    <a href="#"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-secondary underline underline-offset-2 transition-colors">Terms
                        of Service</a>
                    and
                    <a href="#"
                        class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-secondary underline underline-offset-2 transition-colors">Privacy
                        Policy</a>.
                </p>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Already have an account? <a href="login.html" class="text-primary font-medium hover:underline">Log
                    in</a>
            </p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = "password";
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UserTestPro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="font-inter bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased min-h-screen flex items-center justify-center relative">

    <!-- Top Right Toggles -->
    <div class="absolute top-6 right-6 flex items-center gap-4 z-50">
        <button id="theme-toggle" class="p-2 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
            <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
        <button id="rtl-toggle" class="p-2 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-sm border border-slate-200 dark:border-slate-700 text-sm font-medium">
            RTL
        </button>
    </div>

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-[600px] h-[600px] bg-primary/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-[600px] h-[600px] bg-secondary/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Centered Auth Card -->
    <div class="w-full max-w-md px-4 relative z-10 reveal active">
        <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700 p-8 rounded-3xl shadow-2xl">
            
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-sora font-bold text-xl shadow-lg">UX</div>
                    <span class="font-sora font-bold text-2xl text-slate-900 dark:text-white">UserTest<span class="text-primary">Pro</span></span>
                </a>
                <h2 class="text-2xl font-sora font-bold text-slate-900 dark:text-white">Create your account</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Start your journey to better product insights.</p>
            </div>

            <!-- Google Signup -->
            <button class="w-full flex justify-center items-center gap-3 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 px-4 py-3 rounded-xl font-medium transition-colors mb-6">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign up with Google
            </button>

            <div class="relative flex items-center justify-center mb-6">
                <div class="border-t border-slate-200 dark:border-slate-700 w-full absolute"></div>
                <span class="bg-white dark:bg-slate-800 px-3 text-xs text-slate-400 relative z-10 uppercase font-medium">Or continue with</span>
            </div>

            <!-- Email Signup Form -->
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Company Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Work Email</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="pwd" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm pr-10">
                        <button type="button" onclick="togglePassword('pwd', 'pwd-icon')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary">
                            <i data-lucide="eye" id="pwd-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="cpwd" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm pr-10">
                        <button type="button" onclick="togglePassword('cpwd', 'cpwd-icon')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary">
                            <i data-lucide="eye" id="cpwd-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="button" class="w-full bg-primary hover:bg-indigo-600 text-white font-medium py-3.5 rounded-xl transition-all shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] mt-2">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Already have an account? <a href="#" class="text-primary font-medium hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = "password";
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UserTestPro</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="font-inter bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased min-h-screen flex flex-col items-center justify-center py-12 relative overflow-x-hidden">

    <!-- Top Header Toggles -->
    <header class="fixed top-0 left-0 w-full p-6 flex justify-end items-center gap-4 z-50 pointer-events-none">
        <div class="flex items-center gap-4 pointer-events-auto">
            <button id="theme-toggle" class="p-2 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-lg border border-slate-200 dark:border-slate-700 transition-all hover:scale-110">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button id="rtl-toggle" class="p-2 bg-white dark:bg-slate-800 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-secondary rounded-full shadow-lg border border-slate-200 dark:border-slate-700 text-sm font-medium transition-all hover:scale-110 px-4">
                RTL
            </button>
        </div>
    </header>

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-3xl animate-blob"></div>
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-3xl animate-blob animation-delay-2000"></div>
    </div>

    <div class="w-full max-w-xl px-4 relative z-10 reveal active">
        <div class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700 p-8 sm:p-10 rounded-3xl shadow-2xl">
            
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-white font-sora font-bold text-xl">UX</div>
                    <span class="font-sora font-bold text-2xl text-slate-900 dark:text-white">UserTest<span class="text-primary">Pro</span></span>
                </a>
                <h2 class="text-2xl font-sora font-bold text-slate-900 dark:text-white">Create your account</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Join 5,000+ product managers building better UX.</p>
            </div>

            <!-- Email Login Form -->
            <form class="space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">First Name</label>
                        <input type="text" placeholder="Jane" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Last Name</label>
                        <input type="text" placeholder="Doe" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Work Email</label>
                    <input type="email" placeholder="jane@company.com" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="signup-pwd" placeholder="Min. 8 characters" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-sm pr-10">
                        <button type="button" onclick="togglePassword('signup-pwd', 'signup-pwd-icon')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-primary">
                            <i data-lucide="eye" id="signup-pwd-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <!-- Password strength meter (Visual Only) -->
                    <div class="flex gap-1 mt-2">
                        <div class="h-1 flex-1 bg-green-500 rounded-full"></div>
                        <div class="h-1 flex-1 bg-green-500 rounded-full"></div>
                        <div class="h-1 flex-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                        <div class="h-1 flex-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-1">Strong password required</p>
                </div>

                <button type="button" class="w-full bg-primary hover:bg-indigo-700 text-white font-medium py-3.5 rounded-xl transition-all duration-300 shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 mt-4">
                    Create Account
                </button>

                <p class="text-[11px] text-slate-400 dark:text-slate-500 text-center mt-4 leading-relaxed">
                    By creating an account, you agree to our 
                    <a href="#" class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-secondary underline underline-offset-2 transition-colors">Terms of Service</a> 
                    and 
                    <a href="#" class="text-slate-600 dark:text-slate-300 hover:text-primary dark:hover:text-secondary underline underline-offset-2 transition-colors">Privacy Policy</a>.
                </p>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Already have an account? <a href="login.html" class="text-primary font-medium hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = "password";
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Freelance User Testing Moderator</title>
    <script src="assets/js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
  </head>
  <body class="site-shell text-slate-950 antialiased dark:text-white">
    <!-- Quick Actions -->
    <div class="fixed right-4 top-4 z-50 flex gap-2">
      <button class="icon-button grid h-10 w-10 place-items-center bg-white/50 backdrop-blur-md dark:bg-slate-900/50" data-theme-toggle aria-label="Toggle dark mode">
        <i data-lucide="moon" class="h-5 w-5 dark:hidden"></i>
        <i data-lucide="sun" class="hidden h-5 w-5 dark:block"></i>
      </button>
      <button class="icon-button grid h-10 w-10 place-items-center bg-white/50 backdrop-blur-md text-[10px] font-black dark:bg-slate-900/50" data-dir-toggle>RTL</button>
    </div>

    <main class="relative min-h-screen overflow-hidden flex items-center justify-center py-12 px-4">
      <!-- Background Blobs -->
      <div class="absolute -right-24 top-1/4 h-96 w-96 animate-blob rounded-full bg-primary/10 blur-3xl"></div>
      <div class="absolute -left-24 bottom-1/4 h-96 w-96 animate-blob animation-delay-2000 rounded-full bg-secondary/10 blur-3xl"></div>

      <div class="relative z-10 w-full max-w-md flex flex-col items-center">
        <div class="glass-panel w-full p-8 md:p-10 reveal">
          <!-- Internal Logo/Brand -->
          <a href="index.html" class="flex flex-col items-center gap-3 mb-10">
            <span class="grid h-14 w-14 place-items-center rounded-2xl bg-gradient-to-br from-indigo-600 to-cyan-500 text-white shadow-neon">
              <i data-lucide="scan-search" class="h-7 w-7"></i>
            </span>
            <div class="text-center">
              <span class="block font-display text-xl font-extrabold text-slate-950 dark:text-white uppercase tracking-wider">FUT Moderator</span>
              <span class="block text-[10px] font-bold text-primary dark:text-cyan-400 uppercase tracking-[0.2em] mt-1">Research operations</span>
            </div>
          </a>

          <div class="text-center">
            <h2 class="font-display text-2xl font-black">Welcome back</h2>
            <p class="mt-2 text-sm text-slate-500">Enter your credentials to access your workspace.</p>
          </div>

          <div class="mt-10 grid grid-cols-2 gap-3">
            <button class="btn-ghost flex items-center justify-center gap-2 py-3 text-xs font-bold">
              <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-4 w-4" alt="Google"> Google
            </button>
            <button class="btn-ghost flex items-center justify-center gap-2 py-3 text-xs font-bold">
              <i data-lucide="apple" class="h-4.5 w-4.5 mb-0.5"></i> Apple
            </button>
          </div>

          <div class="relative my-8 text-center">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200 dark:border-white/10"></div></div>
            <span class="relative bg-white px-4 text-xs font-bold uppercase tracking-widest text-slate-400 dark:bg-slate-900">Or continue with email</span>
          </div>

          <form class="grid gap-6">
            <div class="grid gap-2">
              <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Email Address</label>
              <input type="email" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 outline-none focus:border-primary dark:border-white/10 dark:bg-white/5" placeholder="name@company.com">
            </div>
            <div class="grid gap-2">
              <div class="flex items-center justify-between">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
                <a href="#" class="text-xs font-bold text-primary hover:underline">Forgot?</a>
              </div>
              <div class="relative">
                <input id="login-password" type="password" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 pr-12 outline-none focus:border-primary dark:border-white/10 dark:bg-white/5" placeholder="••••••••">
                <button type="button" class="absolute right-2 top-1/2 grid h-10 w-10 -translate-y-1/2 place-items-center rounded-lg text-slate-400" data-password-toggle="login-password">
                  <i data-lucide="eye" class="h-5 w-5"></i>
                </button>
              </div>
            </div>
            <a href="dashboard.html" class="btn-primary py-4">Sign In</a>
          </form>

          <p class="mt-8 text-center text-sm text-slate-500">
            New client? <a href="signup.html" class="font-bold text-primary hover:underline">Create account</a>
          </p>
        </div>
        
        <p class="mt-8 text-xs text-slate-500 dark:text-slate-600 reveal">
          © 2026 Freelance User Testing Moderator. Secure System.
        </p>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
